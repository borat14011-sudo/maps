<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>IAH Hub Awards</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh;padding:1rem}h1{font-size:1.2rem;font-weight:700;margin-bottom:.25rem;color:#fff}.sub{font-size:.75rem;color:#888;margin-bottom:1rem}.win-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.25rem}.win-btn{padding:.35rem .8rem;border-radius:2rem;border:1px solid #333;background:#1a1d27;color:#aaa;cursor:pointer;font-size:.78rem;transition:all .15s}.win-btn.active{background:#2563eb;border-color:#2563eb;color:#fff}.hubs{display:grid;grid-template-columns:repeat(auto-fill,minmax(520px,1fr));gap:1rem}.hub-card{background:#1a1d27;border-radius:.75rem;padding:1.1rem;border:1px solid #252836}.hub-header{display:flex;align-items:baseline;gap:.6rem;margin-bottom:.8rem}.hub-iata{font-size:1.5rem;font-weight:800;color:#60a5fa}.hub-name{font-size:.95rem;font-weight:600;color:#e8eaf0}.hub-airline{font-size:.75rem;color:#888;margin-left:auto}.leg-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:#60a5fa;margin-bottom:.4rem}.best-row{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;background:#252836;border-radius:.5rem;padding:.5rem .7rem;margin-bottom:.6rem}.best-prog{font-weight:700;color:#f0f4ff}.best-miles{font-size:1.1rem;font-weight:800;color:#34d399}.best-seats{font-size:.8rem;color:#fbbf24}.best-date{font-size:.8rem;color:#aaa;margin-right:auto}.btn-deep{background:#1e3a5f;color:#60a5fa;border:1px solid #2563eb;border-radius:.35rem;padding:.25rem .6rem;text-decoration:none;font-size:.75rem;white-space:nowrap}.btn-deep:hover{background:#2563eb;color:#fff}.no-data{color:#888;font-style:italic}.prog-table{width:100%;border-collapse:collapse;font-size:.78rem;margin-bottom:.8rem}.prog-table th{text-align:left;color:#888;font-weight:500;padding:.25rem .4rem;border-bottom:1px solid #252836}.prog-table td{padding:.3rem .4rem;border-bottom:1px solid #1a1d27}.prog-table .num{text-align:right;font-variant-numeric:tabular-nums}.prog-table .path{color:#888;font-size:.72rem}.prog-table a{color:#60a5fa;text-decoration:none}.onward{background:#141720;border-radius:.5rem;padding:.7rem .9rem;border-left:3px solid #7c3aed}.onward-title{font-size:.8rem;font-weight:600;color:#c4b5fd;margin-bottom:.2rem}.onward-rates{font-size:.85rem;color:#34d399;margin-bottom:.2rem}.onward-note{font-size:.72rem;color:#888;margin-bottom:.5rem}.reach{display:flex;flex-wrap:wrap;gap:.3rem}.chip{background:#252836;border-radius:.25rem;padding:.15rem .4rem;font-size:.72rem;color:#aaa}.sweep-note{font-size:.72rem;color:#555;margin-top:1.5rem;text-align:center}</style></head><body><h1>&#9992;&#65039; IAH Hub Awards</h1><div class="sub">IAH &#8594; European hub (Leg 1, J class, seats&#8805;2) &middot; sweep end  &middot; generated 2026-06-25</div><div class="win-bar" id="win-bar"><button class="win-btn active" onclick="setWin(null)" id="btn-all">All dates</button></div><div class="hubs" id="hubs"></div><div class="sweep-note">Data from seats.aero web scrape &middot; Onward connection rates are chart-based estimates</div><script>var WINS=[{"label": "Labor Day '26", "start": "2026-09-03", "end": "2026-09-08"}, {"label": "Christmas '26", "start": "2026-12-17", "end": "2026-12-26"}, {"label": "Easter '27", "start": "2027-03-25", "end": "2027-03-30"}, {"label": "Memorial '27", "start": "2027-05-22", "end": "2027-05-26"}];var activeWin=null;function setWin(w){activeWin=w;document.querySelectorAll(".win-btn").forEach(function(b){b.classList.remove("active");});document.getElementById(w?"btn-"+w.label.replace(/[^a-z0-9]/gi,""):"btn-all").classList.add("active");}WINS.forEach(function(w){var b=document.createElement("button");b.className="win-btn";b.id="btn-"+w.label.replace(/[^a-z0-9]/gi,"");b.textContent=w.label;b.onclick=function(){setWin(w);};document.getElementById("win-bar").appendChild(b);});</script></body></html>
