.badge.closed{background:#fce8e6;color:#c5221f}
.badge.open{background:#e6f4ea;color:#137333}
.go{display:inline-block;margin-top:6px;background:var(--blue);color:#fff!important;padding:6px 14px;border-radius:16px;text-decoration:none;font-weight:600;font-size:12.5px}

PLACES.forEach((p,i)=>{
  p.idx=i; p.splurge=/\$1\d\d/.test(p.price); p.sunday=!p.closed_days.includes("Sunday");
  p.montrose=/Montrose|River Oaks/.test(p.hood);
  p.photoUrl = p.photo ? `https://places.googleapis.com/v1/${p.photo}/media?maxWidthPx=500&key=${KEY}` : "";
});
let map, markers=[], iw, cur="all";
function passes(p,f){return f==="all"||(f==="sunday"&&p.sunday)||(f==="splurge"&&p.splurge)||(f==="casual"&&!p.splurge)||(f==="montrose"&&p.montrose)}
function initMap(){
  map=new google.maps.Map(document.getElementById("map"),{mapId:"DEMO_MAP_ID",mapTypeControl:false,streetViewControl:false,fullscreenControl:false,gestureHandling:"greedy"});
  iw=new google.maps.InfoWindow();
  const b=new google.maps.LatLngBounds();
  PLACES.forEach(p=>{
    const pin=new google.maps.marker.PinElement({glyph:String(p.idx+1),glyphColor:"#fff",background:p.sunday?"#137333":"#1a73e8",borderColor:"#fff",scale:1.15});
    const m=new google.maps.marker.AdvancedMarkerElement({position:{lat:p.lat,lng:p.lon},map,content:pin.element,title:p.name});
    m.addListener("click",()=>focusPlace(p.idx,true));
    markers.push(m); b.extend({lat:p.lat,lng:p.lon});
  });
  map.fitBounds(b,{top:70,bottom:230,left:30,right:30});
  buildDeck();
  document.getElementById("chips").addEventListener("click",e=>{
    const c=e.target.closest(".chip"); if(!c)return;
    document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on")); c.classList.add("on");
    cur=c.dataset.f; applyFilter();
  });
}
function buildDeck(){
  const d=document.getElementById("deck");
  d.innerHTML=PLACES.map(p=>`
   <div class="card" id="card-${p.idx}" onclick="focusPlace(${p.idx},false)">
     ${p.photoUrl?`<img loading="lazy" src="${p.photoUrl}" onerror="this.style.display='none'">`:""}
     <div class="body">
       <div class="nm"><span class="n">${p.idx+1}.</span> ${p.name}<span class="badge ${p.sunday?'open':'closed'}">${p.sunday?'Sun ✓':'Closed '+p.closed_days.map(x=>x.slice(0,3)).join('·')}</span></div>
       <div class="meta">${p.category} · ${p.hood}</div>
       <div class="row"><span class="price">${p.price}</span> · <span class="stars">★ ${p.rating} (${p.reviews})</span></div>
       <div class="row" style="color:var(--sub)">${p.notes}</div>
       <a class="go" href="${p.gmaps}" target="_blank" onclick="event.stopPropagation()">Open in Google Maps ↗</a>
     </div>
   </div>`).join("");
  // sync: card scrolled into center -> pan map
  let t; d.addEventListener("scroll",()=>{clearTimeout(t);t=setTimeout(()=>{
    const mid=d.scrollLeft+d.clientWidth/2;
    let best=null,bd=1e9;
    document.querySelectorAll(".card:not(.hide)").forEach(c=>{
      const cm=c.offsetLeft+c.offsetWidth/2, dd=Math.abs(cm-mid);
      if(dd<bd){bd=dd;best=c}
    });
    if(best){const p=PLACES[+best.id.split("-")[1]];map.panTo({lat:p.lat,lng:p.lon})}
  },150)});
}
function focusPlace(i,fromPin){
  const p=PLACES[i];
  map.panTo({lat:p.lat,lng:p.lon}); if(map.getZoom()<14)map.setZoom(14);
  const card=document.getElementById("card-"+i);
  card.scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});
  card.animate([{boxShadow:"0 0 0 3px #1a73e8"},{boxShadow:"0 4px 16px rgba(0,0,0,.25)"}],{duration:1200});
}
function applyFilter(){
  const b=new google.maps.LatLngBounds(); let any=false;
  PLACES.forEach(p=>{
    const ok=passes(p,cur);
    markers[p.idx].map=ok?map:null;
    document.getElementById("card-"+p.idx).classList.toggle("hide",!ok);
    if(ok){b.extend({lat:p.lat,lng:p.lon});any=true}
  });
  if(any)map.fitBounds(b,{top:70,bottom:230,left:30,right:30});
}
</script>
