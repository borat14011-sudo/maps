let map;
function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    mapTypeControl: false, streetViewControl: true, fullscreenControl: true,
    gestureHandling: "greedy",
  });
  const bounds = new google.maps.LatLngBounds();
  const iw = new google.maps.InfoWindow();
  PLACES.forEach((p, i) => {
    const pos = {lat: p.lat, lng: p.lon};
    bounds.extend(pos);
    const marker = new google.maps.Marker({
      position: pos, map, label: {text: String(i+1), color: "#fff", fontWeight: "700"}, title: p.name,
    });
    const nameHtml = p.website ? `<a href="${p.website}" target="_blank">${p.name}</a>` : p.name;
    const closedBadge = p.closed_days.length ? `<div class="iw-closed">Closed ${p.closed_days.map(d=>d.slice(0,3)).join(" · ")}</div>` : `<div class="iw-closed" style="background:#e6f4ea;color:#137333">Open 7 days</div>`;
    const hoursHtml = p.hours.length ? `<details><summary>Hours</summary>${p.hours.join("<br>")}</details>` : "";
    marker.addListener("click", () => {
      iw.setContent(
        `<div class="iw"><div class="iw-name">${i+1}. ${nameHtml}</div>`+
        `<div class="iw-meta">${p.category} · ${p.hood}</div>`+
        `<div><span class="iw-price">${p.price}</span> · <span class="iw-rating">★ ${p.rating} (${p.reviews})</span></div>`+
        closedBadge +
        `<div class="iw-notes">${p.notes}</div>` + hoursHtml +
        `<div style="font-size:11px;color:#80868b">${p.address}</div>`+
        `<a class="gmaps-btn" href="${p.gmaps}" target="_blank">Open in Google Maps ↗</a></div>`);
      iw.open(map, marker);
    });
  });
  map.fitBounds(bounds, 48);
}
